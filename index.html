<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mundos Além do Horizonte</title>

    <!-- SEO -->
    <meta name="description" content="Explore a África do Sul, Austrália e Nova Zelândia — culturas milenares, lendas e história." />
    <meta name="author" content="taaken" />

    <!-- Open Graph -->
    <meta property="og:title" content="Mundos Além do Horizonte" />
    <meta property="og:type" content="website" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link rel="stylesheet" href="style.css" />

    <!-- Loader FIX -->
    <script>
      function hideLoader() {
        const l = document.getElementById("loader");
        if (l) l.classList.add("hidden");
      }

      window.addEventListener("load", hideLoader);

      setTimeout(hideLoader, 2500);
    </script>
  </head>

  <body>
    <!-- LOADER -->
    <div id="loader">
      <p class="loader-text">Explorando o mundo...</p>
    </div>

    <!-- NAVBAR -->
    <nav id="navbar">
      <div class="nav-logo"><span>Mundos Além</span></div>

      <ul class="nav-links">
        <li><a href="#hero">Início</a></li>
        <li><a href="#africa">África do Sul</a></li>
        <li><a href="#australia">Austrália</a></li>
        <li><a href="#nz">Nova Zelândia</a></li>
        <li><a href="#fontes">Fontes</a></li>
      </ul>

      <!-- BOTÃO MOBILE FIX -->
      <button class="nav-toggle" id="navToggle" aria-label="Abrir menu">
        ☰
      </button>
    </nav>

    <!-- HERO -->
    <section id="hero">
      <div class="hero-content">
        <h1>Mundos Além do Horizonte</h1>
        <p>
          Explore culturas, histórias e curiosidades de três regiões incríveis
          do planeta.
        </p>
        <a href="#africa" class="btn btn-primary">Começar</a>
      </div>
    </section>

    <!-- EXEMPLO CORRIGIDO (NEW ZEALAND) -->
    <section id="nz">
      <h2>Nova Zelândia</h2>

      <!-- CORREÇÃO AQUI -->
      <img
        src="new_zealand/curiosidades/kiwi.jpg"
        alt="Kiwi da Nova Zelândia"
        loading="lazy"
      />
    </section>

    <!-- LIGHTBOX (ACESSIBILIDADE) -->
    <div id="lightbox" class="lightbox-overlay">
      <button class="lb-close" id="lbClose" aria-label="Fechar imagem">✕</button>
      <button class="lb-prev" id="lbPrev" aria-label="Imagem anterior">‹</button>
      <button class="lb-next" id="lbNext" aria-label="Próxima imagem">›</button>

      <div class="lb-content">
        <img id="lb-img" src="" alt="" />
        <p id="lb-caption"></p>
      </div>
    </div>

    <!-- FOOTER -->
    <footer>
      <p>© 2026 - Trabalho Escolar</p>
    </footer>

    <!-- SCRIPT COM DEFER -->
    <script src="script.js" defer></script>
  </body>
</html>
